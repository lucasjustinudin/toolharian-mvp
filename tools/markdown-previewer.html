<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Markdown Previewer | ToolHarian</title><meta name="description" content="Preview markdown sederhana."><link rel="stylesheet" href="../assets/css/style.css"></head><body><header><div class="container nav"><a class="brand" href="../index.html">ToolHarian</a><nav class="nav-links"><a href="../index.html">Home</a><a href="../about.html">About</a><a href="../contact.html">Contact</a><a href="../privacy-policy.html">Privacy</a><a href="../terms.html">Terms</a></nav></div></header><main class="container"><section><div class="card"><h1>Markdown Previewer</h1><p class="small">Preview markdown sederhana untuk heading, bold, italic, dan line break dasar.</p><label>Input Markdown</label><textarea id="input"></textarea><div class="actions"><button class="button" onclick="previewMd()">Preview</button></div><div class="result" id="output"></div></div></section></main><footer><div class="container"><p>© 2026 ToolHarian. Tools online gratis buat kebutuhan harian.</p></div></footer><script>function previewMd(){let v=document.getElementById('input').value;v=v.replace(/^### (.*)$/gm,'<h3>$1</h3>').replace(/^## (.*)$/gm,'<h2>$1</h2>').replace(/^# (.*)$/gm,'<h1>$1</h1>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>').replace(/\n/g,'<br>');document.getElementById('output').innerHTML=v;}</script></body></html>
