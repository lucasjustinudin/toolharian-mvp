<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Word Sorter | ToolHarian</title><meta name="description" content="Urutkan kata atau baris A-Z dan Z-A."><link rel="stylesheet" href="../assets/css/style.css"></head><body><header><div class="container nav"><a class="brand" href="../index.html">ToolHarian</a><nav class="nav-links"><a href="../index.html">Home</a><a href="../about.html">About</a><a href="../contact.html">Contact</a><a href="../privacy-policy.html">Privacy</a><a href="../terms.html">Terms</a></nav></div></header><main class="container"><section><div class="card"><h1>Word Sorter</h1><p class="small">Urutkan daftar baris teks dari A-Z atau Z-A dengan cepat.</p><label>Masukkan teks (satu item per baris)</label><textarea id="input"></textarea><div class="actions"><button class="button secondary" onclick="sortAZ()">Sort A-Z</button><button class="button secondary" onclick="sortZA()">Sort Z-A</button></div><label>Hasil</label><textarea id="output"></textarea></div></section></main><footer><div class="container"><p>© 2026 ToolHarian. Tools online gratis buat kebutuhan harian.</p></div></footer><script>function sortAZ(){const lines=document.getElementById('input').value.split('\n').filter(Boolean).sort();document.getElementById('output').value=lines.join('\n');}function sortZA(){const lines=document.getElementById('input').value.split('\n').filter(Boolean).sort().reverse();document.getElementById('output').value=lines.join('\n');}</script></body></html>
