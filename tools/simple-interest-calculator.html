<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Simple Interest Calculator | ToolHarian</title><meta name="description" content="Hitung bunga sederhana secara online."><link rel="stylesheet" href="../assets/css/style.css"></head><body><header><div class="container nav"><a class="brand" href="../index.html">ToolHarian</a><nav class="nav-links"><a href="../index.html">Home</a><a href="../about.html">About</a><a href="../contact.html">Contact</a><a href="../privacy-policy.html">Privacy</a><a href="../terms.html">Terms</a></nav></div></header><main class="container"><section><div class="card"><h1>Simple Interest Calculator</h1><p class="small">Hitung bunga sederhana berdasarkan pokok, suku bunga, dan waktu.</p><label>Pokok pinjaman / tabungan</label><input id="principal" type="number" value="1000000"><label>Bunga per tahun (%)</label><input id="rate" type="number" value="5"><label>Waktu (tahun)</label><input id="time" type="number" value="1"><div class="actions"><button class="button" onclick="calcInterest()">Hitung</button></div><div class="result" id="result">Hasil: -</div></div></section></main><footer><div class="container"><p>© 2026 ToolHarian. Tools online gratis buat kebutuhan harian.</p></div></footer><script>function calcInterest(){const p=parseFloat(document.getElementById('principal').value)||0;const r=parseFloat(document.getElementById('rate').value)||0;const t=parseFloat(document.getElementById('time').value)||0;const interest=(p*r*t)/100;document.getElementById('result').textContent='Hasil bunga: '+interest;}</script></body></html>
