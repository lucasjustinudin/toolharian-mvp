<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Unit Converter | ToolHarian</title><meta name="description" content="Konversi panjang, berat, dan suhu dasar."><link rel="stylesheet" href="../assets/css/style.css"></head><body><header><div class="container nav"><a class="brand" href="../index.html">ToolHarian</a><nav class="nav-links"><a href="../index.html">Home</a><a href="../about.html">About</a><a href="../contact.html">Contact</a><a href="../privacy-policy.html">Privacy</a><a href="../terms.html">Terms</a></nav></div></header><main class="container"><section><div class="card"><h1>Unit Converter</h1><p class="small">Konversi cm ke meter, kg ke gram, dan celsius ke fahrenheit.</p><label>Nilai</label><input id="value" type="number" value="100"><label>Mode konversi</label><select id="mode"><option value="cm-m">cm ke meter</option><option value="kg-g">kg ke gram</option><option value="c-f">celsius ke fahrenheit</option></select><div class="actions"><button class="button" onclick="convertUnit()">Convert</button></div><div class="result" id="result">Hasil: -</div></div></section></main><footer><div class="container"><p>© 2026 ToolHarian. Tools online gratis buat kebutuhan harian.</p></div></footer><script>function convertUnit(){const v=parseFloat(document.getElementById('value').value)||0;const mode=document.getElementById('mode').value;let result='-';if(mode==='cm-m')result=v/100+' meter';if(mode==='kg-g')result=v*1000+' gram';if(mode==='c-f')result=(v*9/5+32)+' °F';document.getElementById('result').textContent='Hasil: '+result;}</script></body></html>
