<main class="container"><section><div class="card"><h1>Remove Duplicate Lines</h1><p class="small">Bersihkan daftar teks dengan menghapus baris yang sama secara otomatis.</p><label>Masukkan daftar teks</label><textarea id="input"></textarea><div class="actions"><button class="button" onclick="dedupe()">Hapus Duplikat</button></div><label>Hasil</label><textarea id="output"></textarea></div></section><section><div class="card"><h2>Tool terkait</h2><div class="grid"><div class="card"><h3>Text Repeater</h3><a href="text-repeater.html">Buka →</a></div><div class="card"><h3>Character Counter</h3><a href="character-counter.html">Buka →</a></div></div></div></section></main><footer><div class="container"><p>© 2026 ToolHarian. Tools online gratis buat kebutuhan harian.</p></div></footer><script>function dedupe(){const lines=document.getElementById('input').value.split('\n');document.getElementById('output').value=[...new Set(lines)].join('\n');}</script>
