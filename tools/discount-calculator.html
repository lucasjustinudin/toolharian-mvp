<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Discount Calculator | ToolHarian</title><meta name="description" content="Hitung harga setelah diskon."><link rel="stylesheet" href="../assets/css/style.css"></head><body><header><div class="container nav"><a class="brand" href="../index.html">ToolHarian</a><nav class="nav-links"><a href="../index.html">Home</a><a href="../about.html">About</a><a href="../contact.html">Contact</a><a href="../privacy-policy.html">Privacy</a><a href="../terms.html">Terms</a></nav></div></header><main class="container"><section><div class="card"><h1>Discount Calculator</h1><p class="small">Hitung harga final setelah diskon dengan cepat.</p><label>Harga awal</label><input id="price" type="number" value="100000"><label>Diskon (%)</label><input id="discount" type="number" value="20"><div class="actions"><button class="button" onclick="calcDiscount()">Hitung</button></div><div class="result" id="result">Harga setelah diskon: 0</div></div></section></main><footer><div class="container"><p>© 2026 ToolHarian. Tools online gratis buat kebutuhan harian.</p></div></footer><script>function calcDiscount(){const price=parseFloat(document.getElementById('price').value)||0;const discount=parseFloat(document.getElementById('discount').value)||0;const finalPrice=price-(price*discount/100);document.getElementById('result').textContent='Harga setelah diskon: '+finalPrice;}</script></body></html>
