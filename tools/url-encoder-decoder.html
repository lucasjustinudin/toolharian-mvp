<main class="container"><section><div class="card"><h1>URL Encoder / Decoder</h1><p class="small">Encode atau decode URL tanpa ribet buka tools random yang tampilannya seperti hasil perang banner ads.</p><label>Input</label><textarea id="input"></textarea><div class="actions"><button class="button secondary" onclick="encodeUrl()">Encode</button><button class="button secondary" onclick="decodeUrl()">Decode</button></div><label>Hasil</label><textarea id="output"></textarea></div></section><section><div class="card"><h2>Tool terkait</h2><div class="grid"><div class="card"><h3>Case Converter</h3><a href="case-converter.html">Buka →</a></div><div class="card"><h3>Remove Duplicate Lines</h3><a href="remove-duplicate-lines.html">Buka →</a></div></div></div></section></main><footer><div class="container"><p>© 2026 ToolHarian. Tools online gratis buat kebutuhan harian.</p></div></footer><script>function encodeUrl(){document.getElementById('output').value=encodeURIComponent(document.getElementById('input').value);}function decodeUrl(){try{document.getElementById('output').value=decodeURIComponent(document.getElementById('input').value);}catch(e){document.getElementById('output').value='URL tidak valid untuk di-decode';}}</script>
